<header
    class="flex h-16 items-center justify-end border-b border-slate-100 bg-white px-5 shadow-sm sm:px-8"
>
    <div class="flex items-center gap-3 sm:gap-5">
        <span class="h-6 w-px bg-slate-200"></span>
        <div class="flex items-center gap-2.5">
            <span
                class="grid size-8 place-items-center rounded-full bg-cyan-500 text-xs font-bold text-white"
                >{{ initials() }}</span
            >
            <span class="max-w-32 truncate text-sm font-semibold text-slate-700 sm:max-w-48">{{
                displayName()
            }}</span>
        </div>
    </div>
</header>
